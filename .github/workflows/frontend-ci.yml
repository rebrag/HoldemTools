name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

# A newer push makes an in-flight run pointless; don't pay for both.
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # windows-latest, not ubuntu, because the committed Playwright baselines
    # are Windows-rendered. Text antialiasing differs enough between
    # DirectWrite and FreeType to fail a grid this text-dense, so a Linux
    # runner needs its own baselines committed under e2e/__screenshots__/linux
    # (the snapshot path is already keyed by platform). Windows runners bill
    # at 2x on private repos - if that matters more than the visual tests,
    # switch to ubuntu-latest and regenerate.
    runs-on: windows-latest
    timeout-minutes: 20

    env:
      # No .env in CI - the repo never ships Firebase credentials. This flag
      # swaps in the offline `demo-gto-lite` config instead, which is the same
      # path the Claude Code cloud sessions use. See the root CLAUDE.md.
      # The emulators themselves are not started: these tests exercise the
      # signed-out state and stub the API they care about.
      USE_FIREBASE_EMULATOR: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build (also type-checks src)
        working-directory: frontend
        run: npm run build

      - name: Type-check e2e
        working-directory: frontend
        run: npm run typecheck:e2e

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium

      - name: End-to-end tests
        working-directory: frontend
        run: npm run test:e2e

      # The report carries the diff images, so a failed visual test can be
      # judged without reproducing it locally.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
