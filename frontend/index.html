<!doctype html>
<html lang="en">
  <head>
    <!-- public/index.html -->
    <!-- monorepo deploy test: 2026-07-15 (v2) -->
    <!-- served from HoldemTools monorepo (frontend/) -->
    <meta name="deploy-source" content="holdemtools-monorepo-v2" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Load the font stylesheet without blocking first paint: media="print"
         defers it, onload swaps it in once fetched. -->
    <link href="https://fonts.googleapis.com/css2?family=Unica+One&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Unica+One&display=swap" rel="stylesheet"></noscript>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HoldemTools</title>
  </head>
  <body class="">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
